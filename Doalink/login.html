<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DoaMais</title>

    <link rel="stylesheet" href="css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>❤️ DoaMais</h1>

            <h2>Bem-vindo!</h2>

            <p>Entre na sua conta para continuar.</p>

            <form id="loginForm">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu email"
                    required>

                <label>Senha</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        required>

                    <button
                        type="button"
                        id="mostrarSenha">

                        👁

                    </button>

                </div>

                <div class="lembrar">

                    <label>

                        <input type="checkbox">

                        Lembrar de mim

                    </label>

                    <a href="#">Esqueci minha senha</a>

                </div>

                <button
                    type="submit"
                    class="btn-login">

                    Entrar

                </button>

            </form>

            <div class="cadastro">

                Não possui uma conta?

                <a href="cadastro.html">

                    Cadastre-se

                </a>

            </div>

            <div class="voltar">

                <a href="index.html">

                    ← Voltar para página inicial

                </a>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
