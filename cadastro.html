<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro | DoaMais</title>

    <link rel="stylesheet" href="css/cadastro.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="cadastro-box">

<h1>❤️ DoaMais</h1>

<h2>Criar Conta</h2>

<p>Preencha os dados abaixo para começar.</p>

<form id="cadastroForm">

<label>Nome Completo</label>

<input
type="text"
id="nome"
placeholder="Digite seu nome completo"
required>

<label>Email</label>

<input
type="email"
id="email"
placeholder="Digite seu email"
required>

<label>Telefone</label>

<input
type="tel"
id="telefone"
placeholder="(34) 99999-9999"
required>

<label>Cidade</label>

<input
type="text"
id="cidade"
placeholder="Sua cidade"
required>

<label>Estado</label>

<select id="estado">

<option>Selecione</option>

<option>MG</option>

<option>SP</option>

<option>RJ</option>

<option>GO</option>

<option>PR</option>

<option>BA</option>

<option>Outros</option>

</select>

<label>Tipo de Usuário</label>

<select id="tipo">

<option>Doador</option>

<option>Receptor</option>

<option>Instituição</option>

</select>

<label>Senha</label>

<div class="password-box">

<input
type="password"
id="senha"
placeholder="Crie uma senha"
required>

<button
type="button"
id="mostrarSenha">

👁

</button>

</div>

<label>Confirmar Senha</label>

<input
type="password"
id="confirmarSenha"
placeholder="Digite novamente a senha"
required>

<div class="termos">

<label>

<input
type="checkbox"
id="termos"
required>

Aceito os Termos de Uso.

</label>

</div>

<button
type="submit"
class="btn-cadastrar">

Criar Conta

</button>

</form>

<div class="login">

Já possui uma conta?

<a href="login.html">

Entrar

</a>

</div>

</div>

</div>

<script src="js/cadastro.js"></script>

</body>

</html>
