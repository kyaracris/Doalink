<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">

<nav>

</nav>

</header>

<div class="container">

<div class="card">

<h1>Editar Doação</h1>

<form id="formEditar">

<label>Nome do Item</label>

<input
type="text"
id="titulo"
required>

<label>Descrição</label>

<textarea
id="descricao"
rows="5"
required></textarea>

<label>Categoria</label>

<select id="categoria">

<option>Roupas</option>

<option>Alimentos</option>

<option>Móveis</option>

<option>Brinquedos</option>

<option>Livros</option>

<option>Eletrônicos</option>

<option>Outros</option>

</select>

<label>Cidade</label>

<input
type="text"
id="cidade"
required>

<label>Imagem (URL)</label>

<input
type="text"
id="imagem">

<button
type="submit">

Salvar Alterações

</button>

</form>

</div>

</div>

<script src="js/editar-doacao.js"></script>

</body>

</html>
